<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - Web</title>
<!-- marked.js: Markdown 渲染 -->
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- highlight.js: 代码高亮 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========== 左侧面板 ========== -->
<aside id="sidebar">
  <div id="logo-bar">
    <span id="logo-text">AI Chat</span>
    <div id="logo-btns">
      <span id="user-email" title="当前登录用户"></span>
      <button class="icon-btn" id="btn-api" title="API 密钥管理">🔑</button>
      <button class="icon-btn" id="btn-settings" title="设置">⚙</button>
      <button class="icon-btn" id="btn-theme" title="切换主题">🌓</button>
      <button class="icon-btn" id="btn-logout" title="退出登录">🚪</button>
    </div>
  </div>

  <button id="btn-new-session">+ 新建会话</button>

  <div class="sep"></div>

  <ul id="session-list"></ul>

  <div id="sidebar-bottom">
    <button id="btn-delete-session">- 删除当前会话</button>
  </div>
</aside>

<!-- ========== 右侧主面板 ========== -->
<main id="main-panel">
  <!-- 顶部信息栏 -->
  <header id="top-bar">
    <button id="btn-menu" title="菜单">☰</button>
    <span id="model-label"></span>
    <div id="top-tools">
      <button class="tool-btn" id="btn-prompt" title="系统提示词">📋</button>
      <button class="tool-btn" id="btn-search" title="搜索消息">🔍</button>
      <button class="tool-btn" id="btn-export" title="导出对话">📤</button>
      <button class="tool-btn" id="btn-stats" title="用量统计">📊</button>
      <button class="tool-btn" id="btn-translation" title="翻译">🌐</button>
      <select id="model-select" title="切换模型"></select>
    </div>
  </header>

  <!-- 聊天区域 -->
  <section id="chat-area">
    <div id="chat-messages"></div>
    <div id="scroll-anchor"></div>
  </section>

  <!-- 输入区域 -->
  <footer id="input-area">
    <div id="input-row">
      <input type="text" id="msg-input" placeholder="输入消息... (Enter 发送)" autofocus>
      <button id="btn-clear" title="清空当前会话">清空</button>
      <button id="btn-send">发送 ▶</button>
    </div>
  </footer>
</main>

<!-- ========== 登录/注册页 ========== -->
<div id="auth-container" class="hidden">
  <div id="auth-card">
    <div id="auth-logo">🤖</div>
    <h1>AI Chat</h1>
    <p id="auth-subtitle">登录以同步你的 API 配置</p>

    <div id="auth-tabs">
      <button class="auth-tab active" data-tab="login">登 录</button>
      <button class="auth-tab" data-tab="register">注 册</button>
    </div>

    <!-- 登录表单 -->
    <form id="login-form" autocomplete="off" novalidate>
      <div class="auth-input-group">
        <input type="email" id="login-email" placeholder="邮箱地址" required autocomplete="email">
      </div>
      <div class="auth-input-group">
        <input type="password" id="login-password" placeholder="密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="auth-submit-btn">登 录</button>
      <a id="forgot-password" href="javascript:void(0)">忘记密码？</a>
    </form>

    <!-- 注册表单 -->
    <form id="register-form" class="hidden" autocomplete="off" novalidate>
      <div class="auth-input-group">
        <input type="email" id="reg-email" placeholder="邮箱地址" required autocomplete="email">
      </div>
      <div class="auth-input-group">
        <input type="password" id="reg-password" placeholder="密码（至少6位）" required autocomplete="new-password" minlength="6">
      </div>
      <div class="auth-input-group">
        <input type="password" id="reg-password-confirm" placeholder="确认密码" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="auth-submit-btn">注 册</button>
    </form>

    <div id="auth-error"></div>
    <div id="auth-loading" class="hidden">
      <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
    </div>
    <button id="btn-skip-auth">跳过登录，离线使用</button>
  </div>
</div>

<!-- ========== 弹窗层 ========== -->
<div id="overlay" class="hidden">
  <!-- API 设置弹窗 -->
  <div id="modal-api" class="modal hidden">
    <div class="modal-header">
      <h2>🔑 API 密钥管理</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="btn-balance" title="查询余额" style="padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--accent-secondary);color:#fff;cursor:pointer;font-size:var(--font-xs);">💰 余额</button>
        <button class="modal-close">&times;</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>配置名称</label>
        <input type="text" id="api-name" placeholder="例如: OpenAI / DeepSeek">
      </div>
      <div class="form-group">
        <label>API 密钥</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>Base URL (可选)</label>
        <input type="text" id="api-url" placeholder="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="api-model" placeholder="gpt-4o">
      </div>
      <button id="btn-save-api">保存配置</button>
      <button id="btn-cancel-edit" class="hidden" style="margin-top:6px">取消编辑</button>
      <div class="sep"></div>
      <div id="api-list"></div>
    </div>
  </div>

  <!-- 系统提示词弹窗 -->
  <div id="modal-prompt" class="modal hidden">
    <div class="modal-header">
      <h2>📋 系统提示词</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <textarea id="system-prompt" rows="6" placeholder="设置 AI 的角色和行为..."></textarea>
      <button id="btn-save-prompt">保存提示词</button>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div id="modal-settings" class="modal hidden">
    <div class="modal-header">
      <h2>⚙ 设置</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Temperature</label>
        <input type="range" id="set-temperature" min="0" max="2" step="0.1" value="0.7">
        <span id="temp-val">0.7</span>
      </div>
      <div class="form-group">
        <label>Max Tokens</label>
        <input type="number" id="set-max-tokens" value="4096" min="1" max="128000">
      </div>
      <div class="form-group">
        <label>Top P</label>
        <input type="range" id="set-top-p" min="0" max="1" step="0.05" value="0.9">
        <span id="topp-val">0.9</span>
      </div>
      <div class="form-group">
        <label>字体大小</label>
        <input type="range" id="set-font-size" min="11" max="20" step="1" value="14">
        <span id="font-val">14px</span>
      </div>
      <div class="sep"></div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="set-proxy-enabled" style="width:auto;">
          启用代理（浏览器使用系统代理）
        </label>
      </div>
      <div class="form-group">
        <label>代理地址</label>
        <input type="text" id="set-proxy-url" placeholder="http://127.0.0.1:7890">
      </div>
      <div class="sep"></div>
      <div style="display:flex;gap:8px;">
        <button id="btn-export-data" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg-label);cursor:pointer;font-size:var(--font-sm);">导出数据</button>
        <button id="btn-import-data" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg-label);cursor:pointer;font-size:var(--font-sm);">导入数据</button>
      </div>
      <input type="file" id="import-file-input" accept=".json" style="display:none;">
    </div>
  </div>

  <!-- 搜索弹窗 -->
  <div id="modal-search" class="modal hidden">
    <div class="modal-header">
      <h2>🔍 搜索消息</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="text" id="search-input" placeholder="输入关键词搜索...">
      <div id="search-results"></div>
    </div>
  </div>

  <!-- 重命名会话弹窗 -->
  <div id="modal-rename" class="modal hidden">
    <div class="modal-header">
      <h2>✏️ 重命名会话</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>当前名称: <span id="rename-old-name"></span></label>
      </div>
      <div class="form-group">
        <label>新名称:</label>
        <input type="text" id="rename-input" placeholder="输入新名称">
      </div>
    </div>
    <div class="modal-footer" style="padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
      <button id="btn-rename-cancel" style="padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg-label);cursor:pointer;">取消</button>
      <button id="btn-rename-ok" style="padding:6px 16px;border:none;border-radius:6px;background:var(--accent-primary);color:#fff;cursor:pointer;font-weight:700;">确定</button>
    </div>
  </div>

  <!-- 余额查询弹窗 -->
  <div id="modal-balance" class="modal hidden">
    <div class="modal-header">
      <h2>💰 账户余额</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="balance-body">
      <div style="color:var(--fg-muted);text-align:center;padding:20px;">加载中...</div>
    </div>
  </div>

  <!-- 翻译弹窗 -->
  <div id="modal-translation" class="modal hidden" style="width:600px;">
    <div class="modal-header">
      <h2>🌐 翻译</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px;">
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="trans-source-lang" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-input);color:var(--fg-text);font-size:var(--font-sm);">
          <option value="auto">🔍 自动检测</option>
          <option value="中文">中文</option><option value="English">English</option>
          <option value="日本語">日本語</option><option value="한국어">한국어</option>
          <option value="Français">Français</option><option value="Deutsch">Deutsch</option>
          <option value="Español">Español</option><option value="Português">Português</option>
          <option value="Русский">Русский</option><option value="العربية">العربية</option>
          <option value="Italiano">Italiano</option><option value="Nederlands">Nederlands</option>
          <option value="Polski">Polski</option><option value="Türkçe">Türkçe</option>
          <option value="Tiếng Việt">Tiếng Việt</option><option value="ไทย">ไทย</option>
          <option value="हिन्दी">हिन्दी</option><option value="Bahasa Melayu">Bahasa Melayu</option>
        </select>
        <button id="btn-trans-swap" title="交换源和目标" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-hover);cursor:pointer;font-size:16px;">⇄</button>
        <select id="trans-target-lang" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-input);color:var(--fg-text);font-size:var(--font-sm);">
          <option value="中文">中文</option><option value="English">English</option>
          <option value="日本語">日本語</option><option value="한국어">한국어</option>
          <option value="Français">Français</option><option value="Deutsch">Deutsch</option>
          <option value="Español">Español</option><option value="Português">Português</option>
          <option value="Русский">Русский</option><option value="العربية">العربية</option>
          <option value="Italiano">Italiano</option><option value="Nederlands">Nederlands</option>
          <option value="Polski">Polski</option><option value="Türkçe">Türkçe</option>
          <option value="Tiếng Việt">Tiếng Việt</option><option value="ไทย">ไทย</option>
          <option value="हिन्दी">हिन्दी</option><option value="Bahasa Melayu">Bahasa Melayu</option>
        </select>
      </div>
      <textarea id="trans-input" rows="5" placeholder="输入要翻译的文本..." style="resize:vertical;font-family:var(--font-family);"></textarea>
      <div style="display:flex;gap:8px;">
        <button id="btn-trans-translate" style="flex:1;padding:8px;border:none;border-radius:6px;background:var(--accent-primary);color:#fff;cursor:pointer;font-weight:700;">翻译</button>
        <button id="btn-trans-clear" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg-label);cursor:pointer;">清空</button>
        <button id="btn-trans-copy" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg-label);cursor:pointer;">复制</button>
      </div>
      <textarea id="trans-output" rows="5" readonly placeholder="翻译结果..." style="resize:vertical;background:var(--bg-hover);"></textarea>
    </div>
  </div>

  <!-- 统计弹窗 -->
  <div id="modal-stats" class="modal hidden">
    <div class="modal-header">
      <h2>📊 用量统计</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="stats-body">
    </div>
  </div>

  <!-- 主题选择器弹窗 -->
  <div id="modal-theme-picker" class="modal hidden" style="width:420px;">
    <div class="modal-header">
      <h2>🎨 选择主题</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="theme-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;"></div>
    </div>
  </div>

  <!-- 导出格式选择弹窗 -->
  <div id="modal-export-format" class="modal hidden" style="width:360px;">
    <div class="modal-header">
      <h2>📤 导出选项</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="export-format-body" style="display:flex;flex-direction:column;gap:8px;">
    </div>
  </div>

  <!-- 快捷键帮助弹窗 -->
  <div id="modal-shortcuts" class="modal hidden" style="width:480px;">
    <div class="modal-header">
      <h2>⌨️ 快捷键</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="shortcuts-body">
    </div>
  </div>

</div>

<!-- 手机端侧边栏遮罩 -->
<div id="sidebar-mask"></div>

<!-- Toast 容器 -->
<div id="toast-container"></div>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
